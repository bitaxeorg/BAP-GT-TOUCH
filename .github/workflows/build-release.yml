name: Build and release Firmware [release]

on:
  release:
    types: [released]
  push:
    branches:
    - main

permissions:
  checks: write
  pull-requests: write
  contents: write

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: List contents of the repository
        run: |
          echo "Listing files in the current directory: ${{ github.workspace }}"
          ls -F
      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: esp32s3
          command: GITHUB_ACTIONS="true" idf.py build
          path: '.'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install esptool
      - name: "Create factory/merged image"
        run: "./merge_bin.sh esp-display.bin"
      - name: upload esp-display.bin
        uses: actions/upload-artifact@v4
        with:
          name: esp-display.bin
          path: esp-display.bin
      - name: Release esp-display.bin
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: esp-display.bin
